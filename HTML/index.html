<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Escritorio XP - Portafolio</title>
    <!-- Tailwind CDN for quick development -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="antialiased bg-cover bg-center min-h-screen flex flex-col" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/5/5f/Bliss_%28Windows_XP%29.png')">

    <!-- Desktop area -->
    <main id="desktop" class="relative flex-1 w-full overflow-hidden">
      <!-- Desktop icons (absolute positioned grid) -->
      <div id="icons" class="p-6 grid grid-cols-2 md:grid-cols-4 gap-y-6 gap-x-8 max-w-5xl">
        <!-- icons are generated by JS -->
      </div>

  <!-- Windows container (floating windows appended here) -->
  <div id="windows" class="absolute inset-0"></div>
    </main>

    <!-- Taskbar (Windows XP style) -->
    <footer id="taskbar" class="fixed left-0 right-0 bottom-0 h-14 taskbar-xp flex items-center px-2">
      <div class="flex items-center gap-2">
        <!-- Start button XP style -->
        <div class="pl-2">
          <button id="startBtn" aria-haspopup="true" aria-expanded="false" class="start-button-xp flex items-center gap-2 px-3 py-1 select-none">
            <img src="images/icon-windows.svg" alt="Inicio" class="w-4 h-4"/>
            <span class="text-sm font-semibold">Inicio</span>
          </button>
        </div>

        <!-- Start menu panel (hidden by default) -->
        <div id="startMenu" role="menu" aria-hidden="true" class="absolute left-2 bottom-14 mb-2 w-64 bg-white shadow-lg rounded border border-gray-300 overflow-hidden start-menu-panel">
          <div class="px-3 py-2 bg-sky-600 text-white">
            <div class="text-sm font-semibold">Menu Inicio</div>
          </div>
          <div class="p-2">
            <div class="text-xs text-gray-600">Pinned</div>
            <div id="startPinned" class="mt-2 grid grid-cols-2 gap-2"></div>
          </div>
          <div class="p-3">
            <p class="text-xs text-gray-600">Seleccione una aplicación</p>
          </div>
          <div class="border-t border-gray-100">
            <ul id="startList" class="divide-y divide-gray-100 bg-white">
              <!-- JS fills this with app entries -->
            </ul>
          </div>
          <div class="border-t border-gray-100 bg-gray-50 px-2 py-1 space-y-2">
            <div class="flex items-center justify-between px-2">
              <label for="startSingleClick" class="text-sm">Abrir con un clic</label>
              <input id="startSingleClick" type="checkbox" class="h-4 w-4" />
            </div>
            <ul>
              <li id="startRestart" class="px-3 py-2 hover:bg-gray-100 cursor-pointer">Reiniciar</li>
              <li id="startShutdown" class="px-3 py-2 hover:bg-gray-100 cursor-pointer">Apagar</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Task area (minimized windows appear here) -->
      <div id="taskArea" class="flex-1 mx-4 flex items-center gap-2 overflow-x-auto px-2"></div>

      <!-- System tray / clock -->
      <div class="flex items-center gap-3">
        <div id="tray" class="flex items-center gap-2 pr-3">
          <!-- tray icons could go here -->
        </div>
        <div id="clock" class="clock-xp text-sm pr-3">00:00</div>
      </div>
    </footer>

    <script src="js/script.js" defer></script>
  </body>
</html>
